server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only the 'app' container
      - source_labels: [__meta_docker_container_name]
        regex: /app
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: container
        replacement: app
    pipeline_stages:
      # Parse JSON structured logs from Spring Boot
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            method: method
            uri: uri
            status: status
            duration_ms: duration_ms
      - labels:
          level:
          method:
          status:
      - output:
          source: message
